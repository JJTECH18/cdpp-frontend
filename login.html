<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDPP — Member Login</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;min-height:100vh;background:#0C1A2E;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(56,189,248,.2) 0%,transparent 55%),radial-gradient(ellipse 40% 40% at 90% 80%,rgba(56,189,248,.08) 0%,transparent 50%),linear-gradient(135deg,#0C1A2E 0%,#0F2239 50%,#0C1A2E 100%)}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.04) 1px,transparent 1px);background-size:50px 50px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent)}
.wrap{position:relative;z-index:1;width:100%;max-width:480px}
.back-home{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,.5);text-decoration:none;font-size:.78rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:24px;transition:color .3s}
.back-home:hover{color:rgba(56,189,248,.8)}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(56,189,248,.15);border-radius:28px;padding:48px 44px;backdrop-filter:blur(24px);box-shadow:0 40px 100px rgba(0,0,0,.35)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:36px;text-decoration:none}
.logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#0284C7,#38BDF8);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:white;box-shadow:0 4px 16px rgba(56,189,248,.3)}
.logo-name{font-family:'Montserrat',sans-serif;font-size:1rem;font-weight:800;color:white}
.logo-sub{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:#38BDF8;margin-top:1px}
h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:white;margin-bottom:6px}
.subtitle{font-size:.88rem;color:rgba(255,255,255,.5);margin-bottom:28px}
.tabs{display:flex;background:rgba(255,255,255,.06);border-radius:14px;padding:4px;margin-bottom:28px;gap:4px}
.tab{flex:1;padding:11px;border-radius:10px;border:none;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .25s;background:transparent;color:rgba(255,255,255,.45);font-family:'Montserrat',sans-serif;letter-spacing:.5px}
.tab.active{background:linear-gradient(135deg,#0284C7,#38BDF8);color:white;box-shadow:0 4px 14px rgba(56,189,248,.35)}
.form{display:none}.form.active{display:block}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{margin-bottom:16px}
label{display:block;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.65);margin-bottom:7px;letter-spacing:.5px;text-transform:uppercase}
input,select,textarea{width:100%;padding:13px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:white;font-size:.88rem;outline:none;transition:all .25s;font-family:'Inter',sans-serif}
input::placeholder{color:rgba(255,255,255,.28)}
input:focus,select:focus{border-color:rgba(56,189,248,.5);background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(56,189,248,.1)}
select option{background:#0F2239;color:white}
.forgot{text-align:right;margin-top:-8px;margin-bottom:18px}
.forgot a{font-size:.75rem;color:#38BDF8;text-decoration:none;font-weight:600}
.forgot a:hover{text-decoration:underline}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#0284C7,#38BDF8);color:white;border:none;border-radius:14px;font-size:.88rem;font-weight:800;cursor:pointer;transition:all .3s;font-family:'Montserrat',sans-serif;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 8px 28px rgba(56,189,248,.3)}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 14px 36px rgba(56,189,248,.45)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alert{padding:14px 16px;border-radius:12px;font-size:.84rem;font-weight:600;margin-bottom:18px;display:none;line-height:1.5}
.alert.success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#10B981}
.alert.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#EF4444}
.alert.info{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);color:#38BDF8}
.spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.success-state{text-align:center;padding:16px 0;display:none}
.success-icon{font-size:3.5rem;margin-bottom:16px;display:block}
.success-state h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:white;margin-bottom:10px}
.success-state p{color:rgba(255,255,255,.6);font-size:.88rem;line-height:1.7}
@media(max-width:500px){.card{padding:36px 28px}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>

<div class="wrap">
  <a href="index.html" class="back-home">← Back to Website</a>

  <div class="card">
    <a href="index.html" class="logo">
      <div class="logo-icon">✝</div>
      <div>
        <div class="logo-name">CAMP DAVID</div>
        <div class="logo-sub">Prayer Power</div>
      </div>
    </a>

    <h1>Member Portal</h1>
    <p class="subtitle">Login or create your account to access the CDPP family.</p>

    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <div class="alert" id="alert"></div>

    <!-- LOGIN FORM -->
    <div class="form active" id="form-login">
      <div class="fg">
        <label>Email Address</label>
        <input type="email" id="l-email" placeholder="your@email.com">
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="l-password" placeholder="••••••••">
      </div>
      <div class="forgot"><a href="#">Forgot Password?</a></div>
      <button class="btn" id="login-btn" onclick="handleLogin()">Login to My Account</button>
    </div>

    <!-- REGISTER FORM -->
    <div class="form" id="form-register">
      <div class="row">
        <div class="fg">
          <label>First Name</label>
          <input type="text" id="r-fname" placeholder="Blessing">
        </div>
        <div class="fg">
          <label>Last Name</label>
          <input type="text" id="r-lname" placeholder="Okafor">
        </div>
      </div>
      <div class="fg">
        <label>Email Address</label>
        <input type="email" id="r-email" placeholder="your@email.com">
      </div>
      <div class="fg">
        <label>Phone Number</label>
        <input type="tel" id="r-phone" placeholder="+234 801 234 5678">
      </div>
      <div class="fg">
        <label>Password (min. 8 characters)</label>
        <input type="password" id="r-password" placeholder="••••••••">
      </div>
      <button class="btn" id="register-btn" onclick="handleRegister()">Create My Account ✦</button>
    </div>

    <!-- SUCCESS STATE (after register) -->
    <div class="success-state" id="success-state">
      <span class="success-icon">🙏</span>
      <h3>Registration Successful!</h3>
      <p>Your account has been created and is awaiting admin approval. You will receive an email once approved. God bless you!</p>
      <br>
      <button class="btn" onclick="switchTab('login')" style="margin-top:8px">Go to Login</button>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
// Redirect if already logged in
if (Auth.isLoggedIn()) {
  window.location.href = Auth.isAdmin() ? 'cdpp-dashboard.html' : 'member-portal.html';
}

function switchTab(tab) {
  ['login','register'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('form-'+t).classList.toggle('active', t===tab);
  });
  document.getElementById('success-state').style.display = 'none';
  hideAlert();
}

function showAlert(msg, type) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = `alert ${type}`;
  el.style.display = 'block';
}

function hideAlert() {
  document.getElementById('alert').style.display = 'none';
}

function setLoading(id, loading, text) {
  const btn = document.getElementById(id);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<div class="spinner"></div> Please wait...' : text;
}

async function handleLogin() {
  const email    = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-password').value;

  if (!email || !password) { showAlert('Please fill in both fields.', 'error'); return; }

  setLoading('login-btn', true, 'Login to My Account');
  hideAlert();

  try {
    const data = await API.post('/auth/login', { email, password });

    if (data.success) {
      Auth.save(data.token, data.data);
      showAlert('Welcome back ' + data.data.firstName + '! 🙏 Redirecting...', 'success');
      setTimeout(() => {
        if (data.data.role === 'admin' || data.data.role === 'super_admin') {
          window.location.href = 'cdpp-dashboard.html';
        } else {
          window.location.href = 'member-portal.html';
        }
      }, 1500);
    } else {
      showAlert(data.message, 'error');
      setLoading('login-btn', false, 'Login to My Account');
    }
  } catch (err) {
    showAlert('Cannot connect to server. Make sure the backend is running.', 'error');
    setLoading('login-btn', false, 'Login to My Account');
  }
}

async function handleRegister() {
  const firstName = document.getElementById('r-fname').value.trim();
  const lastName  = document.getElementById('r-lname').value.trim();
  const email     = document.getElementById('r-email').value.trim();
  const phone     = document.getElementById('r-phone').value.trim();
  const password  = document.getElementById('r-password').value;

  if (!firstName || !lastName || !email || !password) { showAlert('Please fill in all required fields.', 'error'); return; }
  if (password.length < 8) { showAlert('Password must be at least 8 characters.', 'error'); return; }

  setLoading('register-btn', true, 'Create My Account ✦');
  hideAlert();

  try {
    const data = await API.post('/auth/register', { firstName, lastName, email, phone, password });

    if (data.success) {
      document.getElementById('form-register').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';
      document.getElementById('tab-register').classList.remove('active');
    } else {
      showAlert(data.message, 'error');
      setLoading('register-btn', false, 'Create My Account ✦');
    }
  } catch (err) {
    showAlert('Cannot connect to server. Make sure the backend is running.', 'error');
    setLoading('register-btn', false, 'Create My Account ✦');
  }
}

// Press Enter to submit
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('form-login').classList.contains('active')) handleLogin();
  if (document.getElementById('form-register').classList.contains('active')) handleRegister();
});
</script>
</body>
</html>
